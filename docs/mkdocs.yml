theme:
  name: material
  language: en
  logo: assets//logo/logo.png
  favicon: assets/logo/logo.ico
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_javascript:
  - javascript/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [..]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            heading_level: 3
  - llmstxt:
      base_url: https://warprec.readthedocs.io/en/latest/
      full_output: llms-full.txt
      markdown_description: WarpRec is a flexible and efficient framework designed for building, training, and evaluating recommendation models. It supports a wide range of configurations, customizable pipelines, and powerful optimization tools to enhance model performance and usability. WarpRec is designed for both beginners and experienced practitioners. For newcomers, it offers a simple and intuitive interface to explore and experiment with state-of-the-art recommendation models. For advanced users, WarpRec provides a modular and extensible architecture that allows rapid prototyping, complex experiment design, and fine-grained control over every step of the recommendation pipeline. Whether you're learning how recommender systems work or conducting high-performance research and development, WarpRec offers the right tools to match your workflow.
      sections:
        Get Started:
          - index.md
          - get-started/*.md
        Available Pipelines:
          - pipelines/*.md
        Data Management:
          - data-management/*.md
        Configuration:
          - configuration/*.md
        Recommendation Models:
          - recommenders/*.md
        Evaluation:
          - evaluation/*.md
        Evaluation Metrics:
          - evaluation/metrics/*.md
        Cloud & Deployment:
          - cloud/*.md
        Implementation Guides:
          - guides/*.md
        API Reference:
          - api-reference/data/*.md
          - api-reference/recommenders/*.md
          - api-reference/metrics/*.md
