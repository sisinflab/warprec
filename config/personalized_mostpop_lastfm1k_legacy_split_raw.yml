reader:
  loading_strategy: split
  data_type: transaction
  reading_method: local
  rating_type: implicit
  labels:
    user_id_label: user_id
    item_id_label: item_id
    rating_label: rating
    timestamp_label: timestamp
  dtypes:
    user_id_type: int64
    item_id_type: str
    timestamp_type: str
  split:
    # This directory already contains the exact legacy GlobalTemporalSplit output.
    local_path: data/lastfm1k_30000/legacy_global_split_raw
    ext: .csv
    sep: ","
    header: false
writer:
  dataset_name: lastfm1k_30000_personalized_mostpop_legacy_split_raw
  writing_method: local
  local_experiment_path: experiments/lastfm1k/personalized_mostpop_legacy_split_raw/
  results:
    sep: ","
    ext: .csv
  recommendation:
    sep: ","
    ext: .csv
    header: true
    k: 50
    user_label: user_id
    item_label: item_id

evaluation:
  top_k: [10, 20, 50]
  metrics: [nDCG, Precision, Recall, HitRate]
  validation_metric: nDCG@40
  batch_size: 512

models:
  Pop: 
    optimization:
      strategy: grid
      properties:
        mode: max
        seed: 42
      cpu_per_trial: 12
     


general:
  device: cpu
