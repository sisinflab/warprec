reader:
  loading_strategy: dataset
  local_path: data/lastfm1k_30000/lastfm_no_header.csv
  data_type: transaction
  reading_method: local
  rating_type: implicit
  header: False
  sep: ","
  
  dtypes:
    user_id_type: int64
    item_id_type: int64
    timestamp_type: int64


splitter:
  test_splitting:
    strategy: timestamp_slicing
    timestamp: 1232987923   # Global 90% temporal cutoff on the full dataset
  validation_splitting:
    strategy: timestamp_slicing
    timestamp: 1224107126   # Global 90% temporal cutoff on the pre-test train partition

writer:
  dataset_name: lastfm1k_30000      # Aggiornato il nome del dataset
  writing_method: local
  local_experiment_path: experiments/lastfm1k/test/
  results:
    sep: ','
    ext: .csv
  recommendation:
    sep: ','
    ext: .csv
    header: true
    k: 50
    user_label: user_id
    item_label: item_id

evaluation:
  top_k: [10, 20, 50]
  metrics: [nDCG, Precision, Recall, HitRate]
  validation_metric: nDCG@10     # Specifica la metrica per l'early stopping
  batch_size: 512

models:
  BERT4Rec_gts: # Assicurati che il nome coincida con @model_registry.register
    embedding_size: 128
    n_layers: 3
    n_heads: 2
    inner_size: 512      # Modificato: nel primo framework era embedding_size * 4
    dropout_prob: 0.2
    attn_dropout_prob: 0.2
    mask_prob: 0.2
    reg_weight: 0.0      # Importante: 0.0 perché la Cross-Entropy non usa la reg_loss della BPR
    weight_decay: 0
    batch_size: 128
    epochs: 10000
    learning_rate: 0.001
    max_seq_len: 150
    early_stopping:
      monitor: "score"   
      patience: 500
      grace_period: 50
      min_delta: 0.0001

    optimization:
        strategy: grid
        properties:
          mode: max
          seed: 42
        cpu_per_trial: 12
        gpu_per_trial: 1
          

